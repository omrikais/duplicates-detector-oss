<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>

    <radialGradient id="bg" cx="0.25" cy="0.2" r="1.1">
      <stop offset="0" stop-color="#3A4A5E"></stop>
      <stop offset="0.45" stop-color="#22262C"></stop>
      <stop offset="1" stop-color="#131316"></stop>
    </radialGradient>

    <linearGradient id="paperA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4C4C50"></stop>
      <stop offset="1" stop-color="#3A3A3E"></stop>
    </linearGradient>
    <linearGradient id="paperB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E8ECF2"></stop>
      <stop offset="1" stop-color="#C7CED8"></stop>
    </linearGradient>

    <radialGradient id="lens" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#4A90D9" stop-opacity="0.35"></stop>
      <stop offset="0.55" stop-color="#4A90D9" stop-opacity="0.12"></stop>
      <stop offset="1" stop-color="#4A90D9" stop-opacity="0.05"></stop>
    </radialGradient>

    <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7FB3E6"></stop>
      <stop offset="0.5" stop-color="#4A90D9"></stop>
      <stop offset="1" stop-color="#2B5A8F"></stop>
    </linearGradient>

    <filter id="shadowFront" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"></feGaussianBlur>
      <feOffset dx="0" dy="6"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"></feGaussianBlur>
    </filter>
    <clipPath id="lensClip">
      <circle cx="316" cy="296" r="96"></circle>
    </clipPath>
  </defs>


  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"></rect>

  <rect x="1" y="1" width="510" height="510" rx="111" ry="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"></rect>


  <g opacity="0.06" stroke="#FFFFFF" stroke-width="1">
    <line x1="64" y1="128" x2="448" y2="128"></line>
    <line x1="64" y1="192" x2="448" y2="192"></line>
    <line x1="64" y1="256" x2="448" y2="256"></line>

name: CI

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - "pyrightconfig.json"
      - "duplicates_detector/**"
      - "tests/**"
      - "scripts/**"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/ci.yml"
      - ".pre-commit-config.yaml"
      - "pyproject.toml"
      - "pyrightconfig.json"
      - "duplicates_detector/**"
      - "tests/**"
      - "scripts/**"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Pyright
        run: pyright --pythonversion 3.10

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest -v --cov=duplicates_detector --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
